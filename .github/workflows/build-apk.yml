name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set UTF-8 encoding
        run: |
          chcp 65001
          echo "PYTHONUTF8=1" >> $env:GITHUB_ENV
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet
          pip install opencv-python
          pip install pillow
          pip install numpy
          pip install ultralytics

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: flet build apk --module-name app --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build\apk\*.apk
